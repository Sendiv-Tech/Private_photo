<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Vault</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="ambient"><div class="grain"></div></div>

<header style="padding:28px 6vw;position:relative;z-index:2;">
  <a href="index.html" class="brand">
    <svg class="brand-mark" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="gLogin" x1="0" y1="0" x2="32" y2="32">
        <stop offset="0" stop-color="#ff4f9e"/><stop offset="1" stop-color="#8b5cf6"/>
      </linearGradient></defs>
      <path class="shackle shackle-l" d="M16 14 C16 14 9 14 9 8 C9 4 13 3 16 6" stroke="url(#gLogin)" stroke-width="2.6" stroke-linecap="round" fill="none"/>
      <path class="shackle shackle-r" d="M16 14 C16 14 23 14 23 8 C23 4 19 3 16 6" stroke="url(#gLogin)" stroke-width="2.6" stroke-linecap="round" fill="none"/>
      <rect x="7" y="13" width="18" height="14" rx="5" fill="url(#gLogin)"/>
      <circle cx="16" cy="19" r="2" fill="#150f22"/><rect x="15" y="19.5" width="2" height="4" rx="1" fill="#150f22"/>
    </svg>
    Vault
  </a>
</header>

<main class="center-stage" style="min-height:75vh;">
  <div class="glass-panel">
    <span class="panel-eyebrow">Welcome back</span>
    <h1 class="panel-title">Login to your <em>vault</em></h1>
    <p class="panel-subtitle">Your memories have been waiting for you.</p>

    <form data-validate="dashboard.html" novalidate>
      <div class="field">
        <label for="loginId">Email / Username</label>
        <input type="text" id="loginId" placeholder="you@example.com" required>
        <span class="field-error-msg">Enter your email or username</span>
      </div>

      <div class="field">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" required>
        <button type="button" class="toggle-vis" data-target="loginPassword">Show</button>
        <span class="field-error-msg">Enter your password</span>
      </div>

      <div class="row-between">
        <span></span>
        <a href="#" class="btn-text" style="font-size:0.82rem;">Forgot Password?</a>
      </div>

      <button type="submit" class="btn btn-primary">Login</button>
    </form>

    <p class="panel-footnote">New here? <a href="signup.html">Create an account</a></p>
  </div>
</main>

<script src="script.js"></script>
</body>
</html>
