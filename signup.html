<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — Vault</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="ambient"><div class="grain"></div></div>

<header style="padding:28px 6vw;position:relative;z-index:2;">
  <a href="index.html" class="brand">
    <svg class="brand-mark" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="gSignup" x1="0" y1="0" x2="32" y2="32">
        <stop offset="0" stop-color="#ff4f9e"/><stop offset="1" stop-color="#8b5cf6"/>
      </linearGradient></defs>
      <path class="shackle shackle-l" d="M16 14 C16 14 9 14 9 8 C9 4 13 3 16 6" stroke="url(#gSignup)" stroke-width="2.6" stroke-linecap="round" fill="none"/>
      <path class="shackle shackle-r" d="M16 14 C16 14 23 14 23 8 C23 4 19 3 16 6" stroke="url(#gSignup)" stroke-width="2.6" stroke-linecap="round" fill="none"/>
      <rect x="7" y="13" width="18" height="14" rx="5" fill="url(#gSignup)"/>
      <circle cx="16" cy="19" r="2" fill="#150f22"/><rect x="15" y="19.5" width="2" height="4" rx="1" fill="#150f22"/>
    </svg>
    Vault
  </a>
</header>

<main class="center-stage" style="min-height:75vh;">
  <div class="glass-panel">
    <span class="panel-eyebrow">Step 1 of 2</span>
    <h1 class="panel-title">Create your <em>vault</em></h1>
    <p class="panel-subtitle">A few details and your private space is ready.</p>

    <form data-validate="otp.html" novalidate>
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="yourname" required>
        <span class="field-error-msg">Please choose a username</span>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required>
        <span class="field-error-msg">Enter a valid email</span>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
        <button type="button" class="toggle-vis" data-target="password">Show</button>
        <span class="field-error-msg">Please enter a password</span>
      </div>

      <div class="field">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="••••••••" required>
        <button type="button" class="toggle-vis" data-target="confirmPassword">Show</button>
        <span class="field-error-msg">Passwords don't match</span>
      </div>

      <label class="checkbox-row">
        <input type="checkbox" required>
        <span>I agree to the <a href="#">Terms &amp; Conditions</a> and <a href="#">Privacy Policy</a></span>
      </label>

      <button type="submit" class="btn btn-primary">Sign Up</button>
    </form>

    <p class="panel-footnote">Already have an account? <a href="login.html">Login</a></p>
  </div>
</main>

<script src="script.js"></script>
</body>
</html>
