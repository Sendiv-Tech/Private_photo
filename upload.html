<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload — Vault</title>
<link rel="stylesheet" href="style.css">
</head>
<body data-lock-on-idle="true">

<div class="ambient"><div class="grain"></div></div>

<header class="app-header">
  <a href="dashboard.html" class="brand">
    <svg class="brand-mark" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="gUp" x1="0" y1="0" x2="32" y2="32">
        <stop offset="0" stop-color="#ff4f9e"/><stop offset="1" stop-color="#8b5cf6"/>
      </linearGradient></defs>
      <path class="shackle shackle-l" d="M16 14 C16 14 9 14 9 8 C9 4 13 3 16 6" stroke="url(#gUp)" stroke-width="2.6" stroke-linecap="round" fill="none"/>
      <path class="shackle shackle-r" d="M16 14 C16 14 23 14 23 8 C23 4 19 3 16 6" stroke="url(#gUp)" stroke-width="2.6" stroke-linecap="round" fill="none"/>
      <rect x="7" y="13" width="18" height="14" rx="5" fill="url(#gUp)"/>
      <circle cx="16" cy="19" r="2" fill="#150f22"/><rect x="15" y="19.5" width="2" height="4" rx="1" fill="#150f22"/>
    </svg>
    Vault
  </a>
  <nav>
    <a href="dashboard.html">My Vault</a>
    <a href="upload.html" class="active">Upload</a>
    <a href="lock.html">Lock</a>
  </nav>
  <button class="avatar-btn">A</button>
</header>

<main class="app-main" style="max-width:760px;">
  <div class="app-main-head">
    <div>
      <h1 class="app-title">Add to your <em style="font-style:italic;background:var(--gradient-primary);-webkit-background-clip:text;background-clip:text;color:transparent;">vault</em></h1>
      <p class="app-title-sub">Drag photos in, or choose them from your device</p>
    </div>
  </div>

  <div class="dropzone" id="dropzone">
    <svg class="dropzone-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 16V4M12 4l-4 4M12 4l4 4" stroke="url(#gUp)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2" stroke="url(#gUp)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <h3>Drop photos here</h3>
    <p>JPG, PNG or HEIC — up to 25MB each</p>
    <button type="button" class="btn btn-ghost" style="width:auto;padding:11px 24px;" onclick="event.stopPropagation();document.getElementById('fileInput').click();">Choose Files</button>
    <input type="file" id="fileInput" accept="image/*" multiple class="visually-hidden">
  </div>

  <div class="thumb-grid" id="thumbGrid"></div>

  <button id="uploadBtn" class="btn btn-primary" disabled style="max-width:280px;margin:0 auto;display:flex;">Upload to Vault</button>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="script.js"></script>
<script src="upload-supabase.js"></script>
</body>
</html>
