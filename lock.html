<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault Locked</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="ambient"><div class="grain"></div></div>

<main class="center-stage" style="min-height:100vh;">
  <div class="glass-panel text-center" style="max-width:360px;">
    <svg class="brand-mark" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:46px;height:46px;margin:0 auto 18px;display:block;">
      <defs><linearGradient id="gLock" x1="0" y1="0" x2="32" y2="32">
        <stop offset="0" stop-color="#ff4f9e"/><stop offset="1" stop-color="#8b5cf6"/>
      </linearGradient></defs>
      <path class="shackle shackle-l" d="M16 14 C16 14 9 14 9 8 C9 4 13 3 16 6" stroke="url(#gLock)" stroke-width="2.6" stroke-linecap="round" fill="none"/>
      <path class="shackle shackle-r" d="M16 14 C16 14 23 14 23 8 C23 4 19 3 16 6" stroke="url(#gLock)" stroke-width="2.6" stroke-linecap="round" fill="none"/>
      <rect x="7" y="13" width="18" height="14" rx="5" fill="url(#gLock)"/>
      <circle cx="16" cy="19" r="2" fill="#150f22"/><rect x="15" y="19.5" width="2" height="4" rx="1" fill="#150f22"/>
    </svg>

    <h1 class="panel-title" style="font-size:1.7rem;">Vault <em>Locked</em></h1>
    <p class="panel-subtitle">Enter your PIN to unlock</p>

    <div class="pin-dots">
      <span class="pin-dot"></span>
      <span class="pin-dot"></span>
      <span class="pin-dot"></span>
      <span class="pin-dot"></span>
    </div>

    <div class="keypad">
      <button class="key" data-digit="1">1</button>
      <button class="key" data-digit="2">2</button>
      <button class="key" data-digit="3">3</button>
      <button class="key" data-digit="4">4</button>
      <button class="key" data-digit="5">5</button>
      <button class="key" data-digit="6">6</button>
      <button class="key" data-digit="7">7</button>
      <button class="key" data-digit="8">8</button>
      <button class="key" data-digit="9">9</button>
      <button class="key key-action" data-action="biometric" aria-label="Use biometric unlock">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
          <path d="M12 11c0 3-1 5-3 6.5M12 11c0 3.5 1.2 5.7 3.5 7.3M8.5 8.5C9.5 7.6 10.7 7 12 7s2.5.6 3.5 1.5M6.5 6.2A8 8 0 0 1 12 4a8 8 0 0 1 5.5 2.2M4.8 9.5A10 10 0 0 1 12 6a10 10 0 0 1 7.2 3.5M12 11a3 3 0 0 1 3 3c0 1.8-.4 3.3-1.2 4.6"/>
        </svg>
      </button>
      <button class="key" data-digit="0">0</button>
      <button class="key key-action" data-action="delete">⌫</button>
    </div>

    <p class="panel-footnote" style="margin-top:30px;">Not you? <a href="login.html">Switch account</a></p>
  </div>
</main>

<script src="script.js"></script>
</body>
</html>
