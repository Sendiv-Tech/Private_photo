<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Vault — Private. Personal. Protected.</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="ambient"><div class="grain"></div></div>
<div class="particles"></div>

<header style="display:flex;align-items:center;justify-content:space-between;padding:28px 6vw;position:relative;z-index:2;">
  <span class="brand">
    <svg class="brand-mark" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="gNav" x1="0" y1="0" x2="32" y2="32">
          <stop offset="0" stop-color="#ff4f9e"/><stop offset="1" stop-color="#8b5cf6"/>
        </linearGradient>
      </defs>
      <path class="shackle shackle-l" d="M16 14 C16 14 9 14 9 8 C9 4 13 3 16 6" stroke="url(#gNav)" stroke-width="2.6" stroke-linecap="round" fill="none"/>
      <path class="shackle shackle-r" d="M16 14 C16 14 23 14 23 8 C23 4 19 3 16 6" stroke="url(#gNav)" stroke-width="2.6" stroke-linecap="round" fill="none"/>
      <rect x="7" y="13" width="18" height="14" rx="5" fill="url(#gNav)"/>
      <circle cx="16" cy="19" r="2" fill="#150f22"/>
      <rect x="15" y="19.5" width="2" height="4" rx="1" fill="#150f22"/>
    </svg>
    Vault
  </span>
  <a href="login.html" class="btn-text">Login</a>
</header>

<main class="center-stage" style="min-height:80vh;">
  <div class="text-center fade-in" style="max-width:620px;">
    <span class="panel-eyebrow" style="justify-content:center;display:flex;">For two, or just for you</span>
    <h1 class="panel-title" style="font-size:clamp(2.2rem,6vw,3.6rem);">
      Private. <em>Personal.</em> Protected.
    </h1>
    <p class="panel-subtitle" style="font-size:1.05rem;max-width:460px;margin-left:auto;margin-right:auto;">
      A safe place for your memories — locked away from everyone but the two of you.
    </p>
    <div style="display:flex;gap:14px;justify-content:center;flex-wrap:wrap;max-width:360px;margin:0 auto;">
      <a href="signup.html" class="btn btn-primary" style="width:auto;padding:14px 32px;">Get Started</a>
      <a href="login.html" class="btn btn-ghost" style="width:auto;padding:14px 32px;">Login</a>
    </div>
  </div>
</main>

<footer style="text-align:center;padding:24px;color:var(--c-mist);font-size:0.78rem;position:relative;z-index:2;">
  End-to-end secured · Built for the moments worth keeping
</footer>

<script src="script.js"></script>
</body>
</html>
